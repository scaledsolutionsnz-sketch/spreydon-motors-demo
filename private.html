<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Feedback | Spreydon Motors</title>
<meta name="description" content="Share your feedback privately with Spreydon Motors, Christchurch.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ff4d18'/%3E%3Ctext x='16' y='23' font-family='Arial' font-weight='bold' font-size='18' fill='white' text-anchor='middle'%3ESM%3C/text%3E%3C/svg%3E">
</head>
<body>
<main class="private-page">
  <div class="private-card" id="card">
    <span class="eyebrow">Spreydon Motors</span>
    <h1>Tell us what happened</h1>
    <p>We'd rather hear it straight than have you leave unhappy. This goes directly to the workshop — we read every message and we'll make it right where we can.</p>
    <form id="feedbackForm" action="https://formsubmit.co/bkenn09@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="Private feedback — Spreydon Motors website">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="text" name="_honey" style="display:none">
      <div class="field"><label>Name</label><input type="text" name="Name" required placeholder="Your name"></div>
      <div class="field"><label>Email</label><input type="email" name="Email" required placeholder="you@email.com"></div>
      <div class="field"><label>Your rating</label><input type="text" id="ratingField" name="Rating" readonly></div>
      <div class="field"><label>What could we have done better?</label><textarea name="Feedback" required placeholder="Tell us what went wrong and how we can put it right."></textarea></div>
      <button type="submit" class="btn btn--accent">Send feedback</button>
    </form>
  </div>
</main>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var rating = params.get("rating") || "";
  var field = document.getElementById("ratingField");
  field.value = rating ? (rating + " out of 5 ★") : "Not specified";

  // Show a success state in-page after submit (FormSubmit redirects, but provide instant feedback)
  var form = document.getElementById("feedbackForm");
  form.addEventListener("submit", function () {
    try { localStorage.setItem("sm_feedback_sent", "1"); } catch (e) {}
    var card = document.getElementById("card");
    setTimeout(function () {
      card.innerHTML = '<div class="success-state">' +
        '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg></div>' +
        '<h2>Thanks — message sent</h2>' +
        '<p>We appreciate you taking the time. Someone from the workshop will be in touch.</p>' +
        '<a href="index.html" class="btn btn--dark">Back to site</a></div>';
    }, 400);
  });
})();
</script>
</body>
</html>
